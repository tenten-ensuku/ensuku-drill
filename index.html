<!DOCTYPE html>
<html lang="ja">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        html, body, #root {
            height: 100%;
            width: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
        }
        body { font-family: 'Inter', sans-serif; }
        .scroll-screen {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-y;
        }

        @keyframes resultPop {
            0%   { transform: scale(0.6); opacity: 0; }
            60%  { transform: scale(1.1); }
            100% { transform: scale(1);   opacity: 0.85; }
        }

        .problem-tile-group {
            display: inline-flex;
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            overflow: hidden;
            width: fit-content;
            padding-right: 2px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .problem-tile-group img, .problem-tile-group .fallback-tile {
            border-right: 1px solid #e2e8f0;
        }
        .problem-tile-group img:last-child, .problem-tile-group .fallback-tile:last-child {
            border-right: none;
        }

        .rainbow-text {
            background: linear-gradient(to right, #ef4444, #f59e0b, #10b981, #3b82f6, #8b5cf6, #ef4444);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: rainbow 3s linear infinite;
        }
        @keyframes rainbow { to { background-position: 200% center; } }

        .gold-text {
            color: #d4af37;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        .record-badge {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* === オレンジボタン（グラデーション＋立体感）=== */
        .btn-orange {
            background: linear-gradient(to bottom, #fb923c, #ea580c);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.2), 0 4px 12px rgba(234,88,12,0.4);
            color: #ffffff;
            letter-spacing: 0.03em;
            transition: all 0.15s;
        }
        .btn-orange:hover {
            background: linear-gradient(to bottom, #f97316, #c2410c);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.25), 0 6px 16px rgba(234,88,12,0.5);
        }
        .btn-orange:active { transform: scale(0.95); background: linear-gradient(to bottom, #ea580c, #c2410c); }

        /* === 復習ボタン（メタリックローズ）=== */
        .btn-review {
            background: linear-gradient(to bottom, #f43f5e, #be123c);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 12px rgba(190,18,60,0.4);
            color: #ffffff;
            transition: all 0.15s;
        }
        .btn-review:hover { background: linear-gradient(to bottom, #fb7185, #e11d48); }
        .btn-review:active { transform: scale(0.95); }

        /* === お気に入りボタン（メタリックゴールド）=== */
        .btn-favorite {
            background: linear-gradient(to bottom, #fbbf24, #b45309);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 4px 12px rgba(180,83,9,0.4);
            color: #713f12;
            transition: all 0.15s;
        }
        .btn-favorite:hover { background: linear-gradient(to bottom, #fcd34d, #d97706); }
        .btn-favorite:active { transform: scale(0.95); }
    </style>
</head>

        const SoundEffect = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            playCorrect() {
                this.init();
                const now = this.ctx.currentTime;
                const osc1 = this.ctx.createOscillator();
                const gain1 = this.ctx.createGain();
                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(1046.50, now);
                gain1.gain.setValueAtTime(0.15, now);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc1.connect(gain1); gain1.connect(this.ctx.destination);
                const osc2 = this.ctx.createOscillator();
                const gain2 = this.ctx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(1318.51, now + 0.05);
                gain2.gain.setValueAtTime(0, now);
                gain2.gain.setValueAtTime(0.15, now + 0.05);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc2.connect(gain2); gain2.connect(this.ctx.destination);
                osc1.start(now); osc1.stop(now + 0.1);
                osc2.start(now + 0.05); osc2.stop(now + 0.2);
            },
            playIncorrect() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            },
            playTap() {
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(now); osc.stop(now + 0.05);
            }
        };

        // --- シフト可能範囲計算（端牌が1か9になるまで、かつ-3〜+3）---
        const getValidShifts = (tiles) => {
            const minTile = Math.min(...tiles);
            const maxTile = Math.max(...tiles);
            const minK = Math.max(-3, 1 - minTile);
            const maxK = Math.min(3, 9 - maxTile);
            const shifts = [];
            for (let k = minK; k <= maxK; k++) shifts.push(k);
            return shifts;

        // --- 牌画像コンポーネント ---

            const [reviewBucket, setReviewBucket] = useState([]);
            const [showFavorites, setShowFavorites] = useState(false);
            const [lastResult, setLastResult] = useState(null); // null | 'correct' | 'incorrect'
            const [uraMode, setUraMode] = useState(false);
            const [uraGameOver, setUraGameOver] = useState(false);
            const [uraLockMsg, setUraLockMsg] = useState(null);

            // 全スートの牌画像プリロード
            useEffect(() => {
                ['man', 'pin', 'sou'].forEach(suit => {
                    for (let n = 1; n <= 9; n++) {
                        const img = new Image();
                        img.src = `${IMG_BASE}${suit}${n}-66-90-l.png`;

                });
            }, []);

            // 自己ベストをlocalStorageから読み込み
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('mahjong_favorites');
                    if (saved) setFavorites(JSON.parse(saved));
                } catch (_) {}
                try {
                    const saved = localStorage.getItem('mahjong_review_bucket');
                    if (saved) setReviewBucket(JSON.parse(saved));
                } catch (_) {}
            }, []);

            useEffect(() => {
                const parseScore = (v) => {
                    if (!v) return -9999;
                    try { const p = JSON.parse(v); return typeof p === 'number' ? p : (p?.score ?? -9999); } catch { return -9999; }

                const s6  = localStorage.getItem('mahjong6_best');
                const s7  = localStorage.getItem('mahjong7_best');
                const s10_20  = localStorage.getItem('mahjong10_best_20');

                if (s7  !== null) setBestScore7(parseScore(s7));
                if (s10_20  !== null) setBestScore10_20(parseScore(s10_20));
                if (s10_all !== null) setBestScore10_all(parseScore(s10_all));
            }, []);

            const getBestScore = (d, qc) => {
                if (d === '7')  return bestScore7;
                if (d === '10') return qc === 20 ? bestScore10_20 : bestScore10_all;
                return bestScore6;
            };
            const getLsKey = (d, qc) => {
                if (d === '7')  return 'mahjong7_best';
                if (d === '10') return qc === 20 ? 'mahjong10_best_20' : 'mahjong10_best_82';
                return 'mahjong6_best';
            };

            const URA_RANK_ORDER = ['E','D','C','B-','B','B+','A-','A','A+','S','SS','SSS'];
            const isRankSOrAbove = (score, d, qc) => {
                if (score === -9999) return false;
                const { rank } = getRankInfo(score, d, qc);
                return URA_RANK_ORDER.indexOf(rank) >= URA_RANK_ORDER.indexOf('S');
            };

            const startNewGame = (m, d, qc) => {
                SoundEffect.playTap();
                SoundEffect.init();
                pendingStatsRef.current = null;
                setUraGameOver(false);

                const source =
                    d === '7'  ? ALL_PROBLEMS_7  :
                    d === '10' ? ALL_PROBLEMS_10  :
                                 ALL_PROBLEMS_6;

                const shuffled = [...source].sort(() => Math.random() - 0.5);
                const selected = (d === '10' && qc === 20) ? shuffled.slice(0, 20) : shuffled;

                const stack = selected.map(p => {
                    const suit     = SUITS[Math.floor(Math.random() * 3)];
                    const reversed = Math.random() < 0.5;
                    const tilesM   = reversed ? p.tiles.map(mirror)   : p.tiles;
                    const answersM = reversed ? p.answers.map(mirror) : p.answers;
                    if (d === '6' || d === '7') {
                        const validShifts = getValidShifts(tilesM);
                        const k = validShifts[Math.floor(Math.random() * validShifts.length)];
                        return {
                            ...p, suit,
                            tiles:   tilesM.map(n => n + k),
                            answers: answersM.map(n => n + k).filter(n => n >= 1 && n <= 9)
                        };
                    }
                    return { ...p, suit, tiles: tilesM, answers: answersM };
                });

                setProblemStack(stack);
                setWrongLog([]);
                setDrill(d);
                setMode(m);
                setQuestionCount(qc || null);
                setCurrentIdx(0);
                setCorrectCount(0);
                setIncorrectCount(0);
                setIsFinished(false);
                setIsNewRecord(false);
                setSelectedAnswers([]);
                setIsSubmitted(false);
                setStartTime(Date.now());
                setElapsedTime(0);
            };

            const resetToHome = () => {
                if (timerRef.current) clearInterval(timerRef.current);
                setDrill(null);
                setMode(null);
                setQuestionCount(null);
                setProblemStack([]);
                setIsFinished(false);
            };

            useEffect(() => {
                if (startTime && !isFinished) {
                    timerRef.current = setInterval(() => {
                        setElapsedTime(Math.floor((Date.now() - startTime) / 1000));
                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [startTime, isFinished]);

            const toggleAnswer = (num) => {
                if (isSubmitted) return;

                if (mode === 'ura') {
                    if (selectedAnswers.includes(num)) return; // 裏モードは選択解除不可
                    const cp = problemStack[currentIdx];
                    const correctSet = [...new Set(cp.answers)].sort((a, b) => a - b);

                    if (!correctSet.includes(num)) {
                        // 不正解牌 → 即ゲームオーバー
                        SoundEffect.playIncorrect();
                        setIncorrectCount(i => i + 1);
                        setWrongLog(prev => [...prev, { problem: cp, userAnswers: [...selectedAnswers, num] }]);
                        const key = JSON.stringify(cp.tiles) + cp.suit;
                        setReviewBucket(prev => {
                            if (prev.some(b => JSON.stringify(b.tiles) + b.suit === key)) return prev;
                            const item = { id: Date.now(), tiles: cp.tiles, answers: cp.answers, suit: cp.suit };
                            const updated = [...prev, item];
                            localStorage.setItem('mahjong_review_bucket', JSON.stringify(updated));
                            return updated;
                        });
                        setUraGameOver(true);
                        setIsSubmitted(true);
                        setIsFinished(true);
                        return;
                    }

                    // 正解牌
                    SoundEffect.playTap();
                    const newSelected = [...selectedAnswers, num].sort((a, b) => a - b);
                    setSelectedAnswers(newSelected);

                    if (JSON.stringify(newSelected) === JSON.stringify(correctSet)) {
                        // 全正解 → 即自動進行
                        SoundEffect.playCorrect();
                        const nextC = correctCount + 1;
                        const nextI = incorrectCount;
                        setCorrectCount(c => c + 1);
                        pendingStatsRef.current = { correct: nextC, incorrect: nextI };
                        setLastResult('correct');
                        setTimeout(() => nextQuestion(nextC, nextI), 0);
                        setTimeout(() => setLastResult(null), 1000);
                    }
                    return;
                }

                SoundEffect.playTap();
                setSelectedAnswers(prev =>
                    prev.includes(num) ? prev.filter(n => n !== num) : [...prev, num].sort((a, b) => a - b)
                );
            };

            const handleSubmit = () => {
                SoundEffect.playTap();
                const currentProblem = problemStack[currentIdx];
                const correctSet = [...new Set(currentProblem.answers)].sort((a, b) => a - b);
                const isCorrect = JSON.stringify(selectedAnswers.sort((a, b) => a - b)) === JSON.stringify(correctSet);

                if (isCorrect) {
                    setCorrectCount(c => c + 1);
                    SoundEffect.playCorrect();
                    // 復習モードで正解 → バケットから削除
                    if (mode === 'review' && currentProblem.bucketId) {
                        setReviewBucket(prev => {
                            const updated = prev.filter(b => b.id !== currentProblem.bucketId);
                            localStorage.setItem('mahjong_review_bucket', JSON.stringify(updated));
                            return updated;
                        });
                    }
                } else {
                    setIncorrectCount(i => i + 1);
                    SoundEffect.playIncorrect();
                    setWrongLog(prev => [...prev, { problem: currentProblem, userAnswers: [...selectedAnswers] }]);
                    // 間違えた問題を復習バケットへ自動追加（重複なし）
                    if (mode !== 'review') {
                        const key = JSON.stringify(currentProblem.tiles) + currentProblem.suit;
                        setReviewBucket(prev => {
                            if (prev.some(b => JSON.stringify(b.tiles) + b.suit === key)) return prev;
                            const item = { id: Date.now(), tiles: currentProblem.tiles, answers: currentProblem.answers, suit: currentProblem.suit };
                            const updated = [...prev, item];
                            localStorage.setItem('mahjong_review_bucket', JSON.stringify(updated));
                            return updated;
                        });
                    }
                }
                setIsSubmitted(true);

                const nextCorrect   = isCorrect ? correctCount + 1 : correctCount;
                const nextIncorrect = isCorrect ? incorrectCount : incorrectCount + 1;
                pendingStatsRef.current = { correct: nextCorrect, incorrect: nextIncorrect };

                if (mode === 'timeattack') {
                    setLastResult(isCorrect ? 'correct' : 'incorrect');
                    setTimeout(() => nextQuestion(nextCorrect, nextIncorrect), 0);
                    setTimeout(() => setLastResult(null), 1000);
                } else if (mode === 'review' && isCorrect) {
                    setTimeout(() => nextQuestion(nextCorrect, nextIncorrect), 200);
                }
            };

            const nextQuestion = (finalCorrect, finalIncorrect, fromUserClick) => {
                if (fromUserClick) SoundEffect.playTap();
                if (currentIdx + 1 < problemStack.length) {
                    setCurrentIdx(prev => prev + 1);
                    setSelectedAnswers([]);
                    setIsSubmitted(false);
                } else {
                    finishGame(finalCorrect, finalIncorrect);
                }
            };

            const finishGame = (finalCorrect, finalIncorrect) => {
                const pending = pendingStatsRef.current;
                const c = pending ? pending.correct   : (finalCorrect   !== undefined ? finalCorrect   : correctCount);
                const i = pending ? pending.incorrect : (finalIncorrect !== undefined ? finalIncorrect : incorrectCount);
                pendingStatsRef.current = null;
                if (mode === 'review') { setIsFinished(true); return; }

                const elapsed = startTime != null ? Math.floor((Date.now() - startTime) / 1000) : elapsedTime;
                const score   = (c * 10) - (i * 10) - elapsed;

                const key         = getLsKey(drill, questionCount);
                const savedBest   = (() => { try { const v = localStorage.getItem(key); if (!v) return -9999; const p = JSON.parse(v); return typeof p === 'number' ? p : (p?.score ?? -9999); } catch (_) { return -9999; } })();
                const currentBest = Math.max(getBestScore(drill, questionCount), savedBest);

                if (score > currentBest) {
                    if (drill === '7')              setBestScore7(score);
                    else if (drill === '10' && questionCount === 20)  setBestScore10_20(score);
                    else if (drill === '10')         setBestScore10_all(score);
                    else                             setBestScore6(score);
                    localStorage.setItem(key, score.toString());
                    setIsNewRecord(true);
                }
                setIsFinished(true);
            };

            const startFavoritesGame = () => {
                SoundEffect.playTap();
                SoundEffect.init();
                pendingStatsRef.current = null;
                const stack = favorites.map(b => ({
                    tiles: b.tiles, answers: b.answers, suit: b.suit, bucketId: b.id
                })).sort(() => Math.random() - 0.5);
                setProblemStack(stack);
                setWrongLog([]);
                setDrill('review');
                setMode('review');
                setQuestionCount(null);
                setCurrentIdx(0);
                setCorrectCount(0);
                setIncorrectCount(0);
                setIsFinished(false);
                setIsNewRecord(false);
                setSelectedAnswers([]);
                setIsSubmitted(false);
                setStartTime(Date.now());
                setElapsedTime(0);
                setShowFavorites(false);
            };

            const startReviewGame = () => {
                SoundEffect.playTap();
                SoundEffect.init();
                pendingStatsRef.current = null;
                const stack = reviewBucket.map(b => ({
                    tiles: b.tiles, answers: b.answers, suit: b.suit, bucketId: b.id
                })).sort(() => Math.random() - 0.5);
                setProblemStack(stack);
                setWrongLog([]);
                setDrill('review');
                setMode('review');
                setQuestionCount(null);
                setCurrentIdx(0);
                setCorrectCount(0);
                setIncorrectCount(0);
                setIsFinished(false);
                setIsNewRecord(false);
                setSelectedAnswers([]);
                setIsSubmitted(false);
                setStartTime(Date.now());
                setElapsedTime(0);
            };

            const addFavorite = (entry) => {
                const fav = { id: Date.now(), ...entry.problem, addedAt: Date.now() };
                const updated = [...favorites, fav];
                setFavorites(updated);
                localStorage.setItem('mahjong_favorites', JSON.stringify(updated));

            const removeFavorite = (id) => {
                setFavorites(prev => {
                    const updated = prev.filter(f => f.id !== id);

            // ========== お気に入り一覧画面 ==========
            if (!drill && showFavorites) {
                return (

                                </button>
                            </div>

                            <button onClick={startFavoritesGame}

                                まとめて練習する（{favorites.length}問）
                            </button>

                            <div className="space-y-3">
                                {favorites.map((fav) => (
                                    <div key={fav.id} className="bg-white border border-slate-200 rounded-2xl p-3">
                                        <div className="overflow-x-auto mb-2">
                                        <div className="problem-tile-group">
                                            {fav.tiles.slice().sort((a, b) => a - b).map((n, j) => (
                                                <TileImage key={j} num={n} suit={fav.suit} tileCount={fav.tiles.length} />
                                            ))}
                                        </div>
                                        </div>
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-2 text-xs">
                                                <span className="text-slate-400 font-bold">正解</span>
                                                <div className="flex gap-1">
                                                    {fav.answers.slice().sort((a, b) => a - b).map((n, j) => (
                                                        <span key={j} className="w-6 h-7 bg-green-50 border border-green-300 rounded flex items-center justify-center font-black text-green-600">{n}</span>
                                                    ))}
                                                </div>
                                            </div>
                                            <button onClick={() => removeFavorite(fav.id)}
                                                className="text-xs px-2 py-1 bg-slate-100 hover:bg-red-100 hover:text-red-500 text-slate-400 rounded-lg font-bold transition-colors">
                                                ✕ 削除
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // ========== 裏モードホーム画面 ==========
            if (!drill && uraMode) {
                const unlocked6      = isRankSOrAbove(bestScore6, '6');
                const unlocked7      = isRankSOrAbove(bestScore7, '7');
                const unlocked10_20  = isRankSOrAbove(bestScore10_20, '10', 20);
                const unlocked10_all = isRankSOrAbove(bestScore10_all, '10', 82);

                const uColor6  = { border: 'border-indigo-200',  bg: 'bg-indigo-50',  title: 'text-indigo-900',  bestBg: 'bg-white border border-indigo-100',  btn2: 'btn-orange' };
                const uColor7  = { border: 'border-emerald-200', bg: 'bg-emerald-50', title: 'text-emerald-900', bestBg: 'bg-white border border-emerald-100', btn2: 'btn-orange' };
                const uColor10 = { border: 'border-violet-200',  bg: 'bg-violet-50',  title: 'text-violet-900',  bestBg: 'bg-white border border-violet-100',  btn2: 'btn-orange' };
                const UCard = ({ title, color, children }) => (
                    <div className={`rounded-2xl border-2 ${color.border} ${color.bg} p-3`}>
                        <div className={`mb-2 font-black text-base text-center ${color.title}`}>{title}</div>
                        {children}
                    </div>
                );
                const UBtn = ({ label, onClick, locked, color }) => (
                    <button
                        onClick={locked ? () => {
                            setUraLockMsg('解放条件Sを満たしていません');
                            setTimeout(() => setUraLockMsg(null), 2000);
                        } : onClick}
                        className={`flex-1 py-5 rounded-xl font-bold text-sm transition-all active:scale-95 relative overflow-hidden ${
                            locked ? 'bg-slate-200 text-slate-400' : `${color.btn2}`
                        }`}
                    >
                        {locked && (
                            <div className="absolute inset-0 bg-white/60 backdrop-blur-[1px] flex items-center justify-center text-lg">
                                🔒
                            </div>
                        )}
                        {label}
                    </button>
                );
                const UBest = ({ score, drill, qCount, label, color }) => {
                    if (score === -9999) return null;
                    return (
                        <div className={`${color.bestBg} rounded-xl py-1.5 px-3 text-center`}>
                            {label && <div className="text-[9px] text-slate-400 font-bold uppercase tracking-widest">{label}</div>}
                            <BestScoreDisplay score={score} drill={drill} qCount={qCount} size="sm" />
                        </div>
                    );
                };
                return (
                    <div className="h-screen overflow-hidden bg-gray-950 flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-gray-900 rounded-[2rem] shadow-2xl p-5 border border-gray-700">
                            <div className="flex items-center justify-between mb-1">
                                <div className="w-24"></div>
                                <h1 className="text-2xl font-black text-white text-center">🌑 裏モード</h1>
                                <button onClick={() => setUraMode(false)}
                                    className="text-xs font-bold text-gray-300 bg-gray-700 hover:bg-gray-600 border border-gray-500 px-3 py-1.5 rounded-lg transition-colors active:scale-95 whitespace-nowrap">
                                    表モードへ
                                </button>
                            </div>
                            <p className="text-gray-400 text-xs mb-1 text-center">間違えた瞬間ゲームオーバー・全正解で即自動進行</p>
                            <p className="text-gray-600 text-[10px] mb-3 text-center">各モードでS以上を獲得すると解放</p>

                            {uraLockMsg && (
                                <div className="text-center text-red-400 text-xs font-black py-1.5 bg-red-900/30 border border-red-800/50 rounded-lg mb-3">
                                    ⚠ {uraLockMsg}
                                </div>
                            )}

                            <div className="space-y-3">
                                <div className="grid grid-cols-2 gap-3">
                                    <UCard title="6枚形" color={uColor6}>
                                        <div className="flex gap-2 mb-2">
                                            <UBtn label="13問" locked={!unlocked6} color={uColor6} onClick={() => startNewGame('ura', '6', 13)} />
                                        </div>
                                        <UBest score={bestScore6} drill="6" color={uColor6} />
                                    </UCard>
                                    <UCard title="7枚形" color={uColor7}>
                                        <div className="flex gap-2 mb-2">
                                            <UBtn label="19問" locked={!unlocked7} color={uColor7} onClick={() => startNewGame('ura', '7', 19)} />
                                        </div>
                                        <UBest score={bestScore7} drill="7" color={uColor7} />
                                    </UCard>
                                </div>
                                <UCard title="10枚形" color={uColor10}>
                                    <div className="flex gap-2 mb-2">
                                        <UBtn label="ランダム20問" locked={!unlocked10_20} color={uColor10} onClick={() => startNewGame('ura', '10', 20)} />
                                        <UBtn label="全82問" locked={!unlocked10_all} color={uColor10} onClick={() => startNewGame('ura', '10', 82)} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <UBest score={bestScore10_20}  drill="10" qCount={20}  color={uColor10} />
                                        <UBest score={bestScore10_all} drill="10" qCount={82}  color={uColor10} />
                                    </div>
                                </UCard>
                            </div>

                            <hr className="border-gray-600 mt-3" />
                            <div className="flex gap-2 pt-3">
                                <button onClick={reviewBucket.length > 0 ? startReviewGame : undefined}
                                    className={`flex-1 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-1 ${reviewBucket.length > 0 ? 'btn-review' : 'bg-gray-800 text-gray-600 cursor-default'}`}>
                                    🔄 復習
                                    <span className={`text-xs font-black px-1.5 py-0.5 rounded-full ${reviewBucket.length > 0 ? 'bg-white/20 text-white' : 'bg-gray-700 text-gray-600'}`}>{reviewBucket.length}</span>
                                </button>
                                <button onClick={favorites.length > 0 ? () => setShowFavorites(true) : undefined}
                                    className={`flex-1 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-1 ${favorites.length > 0 ? 'btn-favorite' : 'bg-gray-800 text-gray-600 cursor-default'}`}>
                                    ⭐ お気に入り
                                    <span className={`text-xs font-black px-1.5 py-0.5 rounded-full ${favorites.length > 0 ? 'bg-white/20 text-yellow-900' : 'bg-gray-700 text-gray-600'}`}>{favorites.length}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ========== ホーム画面 ==========
            if (!drill) {
                const DrillCard = ({ d, title, color, buttons }) => {
                    return (
                        <div className={`rounded-2xl border-2 ${color.border} ${color.bg} p-3`}>
                            <div className="mb-2 text-center">
                                <div className={`font-black text-base ${color.title}`}>{title}</div>
                            </div>
                            {buttons}
                        </div>
                    );
                };

                const TwoButtonRow = ({ d, qc, color }) => (
                    <div className="flex gap-2 mb-3">
                        <button onClick={() => startNewGame('timeattack', d, qc)}
                            className={`flex-1 py-5 ${color.btn2} text-white rounded-xl font-bold text-sm transition-all active:scale-95`}>
                            タイムアタック
                        </button>
                    </div>
                );

                const BestBadge = ({ score, drill, qCount, label, color }) => {
                    if (score === -9999) return null;
                    return (
                        <div className={`${color.bestBg} rounded-xl py-1.5 px-3 text-center`}>
                            {label && <div className="text-[9px] text-slate-400 font-bold uppercase tracking-widest">{label}</div>}
                            <BestScoreDisplay score={score} drill={drill} qCount={qCount} size="sm" />
                        </div>
                    );
                };

                const color6  = { border: 'border-indigo-200',  bg: 'bg-indigo-50',  title: 'text-indigo-900',  sub: 'text-indigo-500',  btn1: 'bg-indigo-500 hover:bg-indigo-600',  btn2: 'btn-orange', bestBg: 'bg-white border border-indigo-100' };
                const color7  = { border: 'border-emerald-200', bg: 'bg-emerald-50', title: 'text-emerald-900', sub: 'text-emerald-500', btn1: 'bg-emerald-500 hover:bg-emerald-600', btn2: 'btn-orange', bestBg: 'bg-white border border-emerald-100' };
                const color10 = { border: 'border-violet-200',  bg: 'bg-violet-50',  title: 'text-violet-900',  sub: 'text-violet-500',  btn1: 'bg-violet-500 hover:bg-violet-600',  btn2: 'btn-orange', bestBg: 'bg-white border border-violet-100' };

                return (
                    <div className="h-screen overflow-hidden flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-5 border border-slate-100">
                            <div className="flex items-center justify-between mb-1">
                                <div className="w-16"></div>
                                <h1 className="text-2xl font-black text-slate-800 text-center">【エンスクドリル】</h1>
                                <button onClick={() => setUraMode(true)}
                                    className="text-[10px] font-black text-gray-400 hover:text-gray-700 px-2 py-1 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors whitespace-nowrap">

                            <div className="space-y-3">

                                            <div className="flex gap-2 mb-3">
                                                <button onClick={() => startNewGame('timeattack', '6', 13)}
                                                    className={`flex-1 py-5 ${color6.btn2} rounded-xl font-bold text-sm`}>
                                                    13問
                                                </button>
                                            </div>
                                            <BestBadge score={bestScore6} drill="6" color={color6} />
                                        </>}
                                    />
                                    <DrillCard d="7" title="7枚形" color={color7}

                                            <div className="flex gap-2 mb-3">
                                                <button onClick={() => startNewGame('timeattack', '7', 19)}
                                                    className={`flex-1 py-5 ${color7.btn2} rounded-xl font-bold text-sm`}>
                                                    19問
                                                </button>
                                            </div>
                                            <BestBadge score={bestScore7} drill="7" color={color7} />
                                        </>}
                                    />
                                </div>
                                <DrillCard d="10" title="10枚形" color={color10}
                                    buttons={<>
                                        <div className="flex gap-2 mb-3">
                                            <button onClick={() => startNewGame('timeattack', '10', 20)}
                                                className={`flex-1 py-5 ${color10.btn2} rounded-xl font-bold text-sm`}>

                                            <BestBadge score={bestScore10_all} drill="10" qCount={82} color={color10} />

                            <div className="flex gap-2 pt-3">

                                    className={`flex-1 py-2 rounded-xl font-bold text-sm flex items-center justify-center gap-1 ${reviewBucket.length > 0 ? 'btn-review' : 'bg-rose-100 text-rose-300 cursor-default'}`}>
                                    🔄 復習
                                    <span className={`text-xs font-black px-1.5 py-0.5 rounded-full ${reviewBucket.length > 0 ? 'bg-white/20 text-white' : 'bg-rose-200 text-rose-300'}`}>{reviewBucket.length}</span>
                                </button>
                                <button onClick={favorites.length > 0 ? () => setShowFavorites(true) : undefined}
                                    className={`flex-1 py-2 rounded-xl font-bold text-sm flex items-center justify-center gap-1 ${favorites.length > 0 ? 'btn-favorite' : 'bg-yellow-100 text-yellow-300 cursor-default'}`}>
                                    ⭐ お気に入り
                                    <span className={`text-xs font-black px-1.5 py-0.5 rounded-full ${favorites.length > 0 ? 'bg-white/20 text-yellow-900' : 'bg-yellow-200 text-yellow-300'}`}>{favorites.length}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ========== 裏モード：ゲームオーバー画面 ==========
            if (isFinished && mode === 'ura' && uraGameOver) {
                return (
                    <div className="h-screen overflow-hidden bg-gray-950 flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-gray-900 rounded-[2rem] shadow-2xl p-8 text-center border border-gray-700">
                            <div className="text-7xl mb-4">💀</div>
                            <h2 className="text-4xl font-black text-white mb-1 tracking-widest">GAME OVER</h2>
                            <p className="text-gray-400 text-sm mb-6">{currentIdx + 1}問目で終了</p>
                            <div className="grid grid-cols-2 gap-3 mb-6">
                                <div className="bg-gray-800 border border-gray-600 rounded-2xl p-3">
                                    <div className="text-green-400 font-black text-3xl">{correctCount}</div>
                                    <div className="text-gray-400 font-bold text-xs mt-1">正解</div>
                                </div>
                                <div className="bg-gray-800 border border-red-900 rounded-2xl p-3">
                                    <div className="text-red-400 font-black text-3xl">{elapsedTime}秒</div>
                                    <div className="text-gray-400 font-bold text-xs mt-1">経過時間</div>
                                </div>
                            </div>
                            <button onClick={resetToHome}
                                className="w-full py-4 bg-gray-700 hover:bg-gray-600 text-white rounded-2xl font-black text-lg transition-all active:scale-95 mb-3">
                                メニューに戻る
                            </button>
                            <button onClick={() => startNewGame(mode, drill, questionCount)}
                                className="w-full py-4 bg-orange-500 hover:bg-orange-400 text-white rounded-2xl font-black text-lg transition-all active:scale-95">
                                もう一度
                            </button>
                        </div>
                    </div>
                );
            }


            // ========== 復習モード結果画面 ==========
            if (isFinished && mode === 'review') {
                return (
                    <div className="h-screen overflow-hidden flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-8 text-center">
                            <div className="text-5xl mb-4">🔄</div>
                            <h2 className="text-2xl font-black text-slate-800 mb-2">復習完了！</h2>
                            <div className="grid grid-cols-2 gap-3 mb-6 text-sm">
                                <div className="bg-green-50 border border-green-200 rounded-2xl p-3">
                                    <div className="text-green-600 font-black text-2xl">{correctCount}</div>
                                    <div className="text-green-500 font-bold text-xs">正解（バケットから削除）</div>
                                </div>
                                <div className="bg-red-50 border border-red-200 rounded-2xl p-3">
                                    <div className="text-red-500 font-black text-2xl">{incorrectCount}</div>
                                    <div className="text-red-400 font-bold text-xs">不正解（バケットに残留）</div>
                                </div>
                            </div>
                            <div className="bg-slate-50 rounded-xl p-3 mb-6 text-sm text-slate-500 font-bold">
                                現在の復習バケット：{reviewBucket.length}問
                            </div>
                            <button onClick={resetToHome}
                                className="w-full py-4 bg-slate-800 text-white rounded-xl font-bold shadow-lg hover:bg-slate-700 transition-colors">
                                タイトルへ戻る
                            </button>
                        </div>
                    </div>
                );
            }

            // ========== 結果画面 ==========
            if (isFinished) {
                const finalScore = (correctCount * 10) - (incorrectCount * 10) - elapsedTime;
                const rankInfo   = getRankInfo(finalScore, drill, questionCount);
                const bs         = getBestScore(drill, questionCount);
                const drillLabel = drill === '7' ? '7枚形' : drill === '10' ? `10枚形（${questionCount}問）` : '6枚形';

                return (
                    <div className="h-screen scroll-screen p-4">
                        <div className="min-h-full flex items-center justify-center">
                        <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-8 text-center relative overflow-hidden">
                            {isNewRecord && (
                                <div className="absolute top-4 right-[-35px] bg-yellow-400 text-yellow-900 text-[10px] font-black py-1 px-10 rotate-45 shadow-sm record-badge">
                                    NEW RECORD
                                </div>
                            )}

                            <div className="text-xs font-bold text-slate-400 mb-1">{drillLabel}</div>
                            <h2 className="text-2xl font-bold mb-2 text-slate-800">結果発表</h2>
                            <div className={`text-7xl font-black mb-2 italic ${rankInfo.color}`}>{rankInfo.rank}</div>

                            <div className="mb-4">
                                {isNewRecord && <div className="text-orange-500 font-black text-sm mb-1 animate-bounce">記録更新！</div>}
                                <div className="text-4xl font-black text-slate-700">{finalScore} <span className="text-lg">pt</span></div>
                            </div>

                            <p className="text-slate-600 font-bold mb-8 px-4 leading-relaxed min-h-[3rem] flex items-center justify-center">
                                {rankInfo.comment}
                            </p>

                            <div className="grid grid-cols-2 gap-4 mb-8 text-left">
                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                    <div className="text-[10px] text-slate-400 font-bold uppercase mb-1">Score Stats</div>
                                    <div className="flex justify-between items-center text-sm mb-1">
                                        <span className="text-green-600 font-bold">正解 (+{correctCount * 10})</span>
                                        <span className="text-slate-400 font-mono">x{correctCount}</span>
                                    </div>
                                    <div className="flex justify-between items-center text-sm mb-1">
                                        <span className="text-red-500 font-bold">ミス (-{incorrectCount * 10})</span>
                                        <span className="text-slate-400 font-mono">x{incorrectCount}</span>
                                    </div>
                                    <div className="flex justify-between items-center text-sm">
                                        <span className="text-orange-500 font-bold">時間 (-{elapsedTime})</span>
                                        <span className="text-slate-400 font-mono">{elapsedTime}秒</span>
                                    </div>
                                    <div className="flex justify-between items-center text-sm mt-1">
                                        <span className="text-slate-500 font-bold">1問あたり</span>
                                        <span className="text-slate-400 font-mono">{(elapsedTime / problemStack.length).toFixed(1)}秒</span>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-col justify-center items-center">
                                    <div className="text-[10px] text-slate-400 font-bold uppercase mb-1">自己ベスト</div>
                                    {bs !== -9999
                                        ? <BestScoreDisplay score={bs} drill={drill} qCount={questionCount} size="sm" />
                                        : <span className="text-2xl font-black text-slate-700">—</span>
                                    }
                                </div>
                            </div>

                            <button onClick={resetToHome}
                                className="w-full py-4 bg-slate-800 text-white rounded-xl font-bold shadow-lg hover:bg-slate-700 transition-colors mb-3">
                                メニューに戻る
                            </button>
                            <button onClick={() => startNewGame(mode, drill, questionCount)}
                                className="w-full py-4 bg-orange-500 text-white rounded-xl font-bold shadow-lg hover:bg-orange-400 transition-colors">
                                もう一度
                            </button>

                            {wrongLog.length > 0 && (
                                <div className="mt-8 text-left">
                                    <div className="text-sm font-black text-red-500 mb-3">
                                        ❌ 間違えた問題（{wrongLog.length}問）
                                    </div>
                                    <div className="space-y-3">
                                        {wrongLog.map((entry, i) => {
                                            const alreadyFaved = favorites.some(f =>
                                                JSON.stringify(f.tiles) === JSON.stringify(entry.problem.tiles) &&
                                                f.suit === entry.problem.suit
                                            );
                                            return (
                                                <div key={i} className="bg-slate-50 border border-slate-200 rounded-2xl p-3">
                                                    <div className="overflow-x-auto mb-2">
                                                    <div className="problem-tile-group">
                                                        {entry.problem.tiles.slice().sort((a, b) => a - b).map((n, j) => (
                                                            <TileImage key={j} num={n} suit={entry.problem.suit} tileCount={entry.problem.tiles.length} />
                                                        ))}
                                                    </div>
                                                    </div>
                                                    <div className="flex items-center gap-2 text-xs mb-1">
                                                        <span className="text-slate-400 font-bold w-20">あなたの答え</span>
                                                        <div className="flex gap-1">
                                                            {entry.userAnswers.length === 0
                                                                ? <span className="text-slate-300">（未選択）</span>
                                                                : entry.userAnswers.map((n, j) => (
                                                                    <span key={j} className="w-6 h-7 bg-red-50 border border-red-200 rounded flex items-center justify-center font-black text-red-500">{n}</span>
                                                                ))
                                                            }
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center justify-between">
                                                        <div className="flex items-center gap-2 text-xs">
                                                            <span className="text-slate-400 font-bold w-20">正　　解</span>
                                                            <div className="flex gap-1">
                                                                {entry.problem.answers.slice().sort((a, b) => a - b).map((n, j) => (
                                                                    <span key={j} className="w-6 h-7 bg-green-50 border border-green-300 rounded flex items-center justify-center font-black text-green-600">{n}</span>
                                                                ))}
                                                            </div>
                                                        </div>
                                                        <button
                                                            onClick={() => alreadyFaved ? null : addFavorite(entry)}
                                                            className={`text-xs px-2 py-1 rounded-lg font-bold transition-all ${
                                                                alreadyFaved
                                                                    ? 'bg-yellow-100 text-yellow-600 cursor-default'
                                                                    : 'bg-slate-200 hover:bg-yellow-100 hover:text-yellow-600 text-slate-500 active:scale-95'
                                                            }`}
                                                        >
                                                            {alreadyFaved ? '⭐ 追加済み' : '☆ お気に入り'}
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                        </div>
                    </div>
                );
            }

            // ========== ゲーム画面 ==========
            const currentProblem = problemStack[currentIdx];
            const tileCount      = currentProblem ? currentProblem.tiles.length : 6;
            const scaleClass     = tileCount >= 10 ? '' : 'scale-110 sm:scale-125';
            const dark = false;

            return (
                <div className={`max-w-md mx-auto h-screen overflow-hidden flex flex-col relative ${dark ? 'bg-gray-950' : 'bg-slate-50'}`}>
                    <div className={`px-4 py-3 flex justify-between items-center shadow-sm sticky top-0 z-50 ${dark ? 'bg-gray-900 border-b border-gray-700' : 'bg-white border-b border-slate-100'}`}>
                        <div className={`font-bold text-sm w-16 ${dark ? 'text-gray-400' : 'text-slate-400'}`}>{currentIdx + 1} / {problemStack.length}</div>

                        <div className="flex items-center gap-1.5">
                            <button onClick={resetToHome}
                                className={`flex items-center gap-1 px-3 py-1.5 rounded-full transition-colors ${dark ? 'bg-gray-700 hover:bg-gray-600 text-gray-300' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                                </svg>
                                <span className="text-xs font-bold tracking-tighter">メニューへ</span>
                            </button>
                            <button onClick={() => startNewGame(mode, drill, questionCount)}
                                className={`flex items-center gap-1 px-3 py-1.5 rounded-full transition-colors ${dark ? 'bg-gray-700 hover:bg-gray-600 text-gray-300' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>
                                <span className="text-xs font-bold tracking-tighter">🔁 リトライ</span>
                            </button>
                        </div>

                        <div className="font-mono font-black text-orange-500 text-xl w-16 text-right">{elapsedTime}秒</div>
                    </div>

                    <div className="flex-1 p-4 flex flex-col items-center overflow-hidden">
                        {/* 牌表示（2スロット切り替えで爆速化） */}
                        <div className="mt-8 mb-10 relative" style={{ minHeight: '120px' }}>
                            {[0, 1].map((slot) => {
                                const problemIndex = slot === 0
                                    ? (currentIdx % 2 === 0 ? currentIdx : currentIdx + 1)
                                    : (currentIdx % 2 === 1 ? currentIdx : currentIdx + 1);
                                const problem    = problemStack[problemIndex];
                                const isVisible  = (currentIdx % 2 === 0) === (slot === 0);
                                if (!problem) return null;
                                return (
                                    <div
                                        key={slot}
                                        className={`problem-tile-group ${scaleClass}`}
                                        style={{
                                            position: isVisible ? 'relative' : 'absolute',
                                            left: 0, top: 0,
                                            opacity: isVisible ? 1 : 0,
                                            pointerEvents: isVisible ? 'auto' : 'none',
                                            visibility: isVisible ? 'visible' : 'hidden',
                                        }}
                                    >
                                        {problem.tiles.slice().sort((a, b) => a - b).map((n, i) => (
                                            <TileImage key={`${problemIndex}-${i}`} num={n} suit={problem.suit} tileCount={problem.tiles.length} />
                                        ))}
                                    </div>
                                );
                            })}
                        </div>

                        {/* ○✕ インジケーター（1ボタンの上） */}
                        <div className="w-full max-w-[360px] h-12 flex items-center mb-1">
                            {lastResult && (
                                <span style={{
                                    fontSize: '44px',
                                    fontWeight: 900,
                                    lineHeight: 1,
                                    color: lastResult === 'correct' ? '#ef4444' : '#3b82f6',
                                }}>
                                    {lastResult === 'correct' ? '○' : '✕'}
                                </span>
                            )}
                        </div>

                        {/* 回答ボタン 1〜9 */}
                        <div className="grid grid-cols-3 gap-0 w-full max-w-[360px] mb-8">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => (
                                <button
                                    key={n}
                                    onClick={() => toggleAnswer(n)}
                                    disabled={isSubmitted && !dark}
                                    className={`aspect-video rounded-xl flex items-center justify-center text-4xl font-black transition-all
                                        ${selectedAnswers.includes(n)
                                            ? 'bg-indigo-500 text-white scale-95 shadow-inner'
                                            : dark
                                                ? 'bg-gray-800 text-gray-100 border-2 border-gray-600 shadow-sm'
                                                : 'bg-white text-slate-700 border-2 border-slate-200 shadow-sm'}
                                        ${isSubmitted && currentProblem.answers.includes(n)
                                            ? 'ring-4 ring-yellow-400 z-10'
                                            : ''}
                                    `}
                                >
                                    {n}
                                </button>
                            ))}
                        </div>

                        {/* 確定ボタン / 正解表示（裏モードでは非表示） */}
                        <div className="w-full max-w-[360px]">
                            {mode === 'ura' ? null : !isSubmitted ? (
                                <button
                                    onClick={handleSubmit}
                                    disabled={selectedAnswers.length === 0}
                                    className="w-full py-6 bg-indigo-600 disabled:bg-slate-200 text-white rounded-2xl font-black text-2xl shadow-lg transition-all active:scale-95"
                                >
                                    回答を確定
                                </button>
                            ) : (
                                <div className="space-y-4 animate-in fade-in slide-in-from-bottom-2">
                                    <div className="flex items-center justify-center gap-3 bg-white p-4 rounded-2xl border-2 border-slate-200 shadow-sm">
                                        <span className="text-slate-400 font-black text-xs uppercase">Correct:</span>
                                        <div className="flex gap-1">
                                            {currentProblem.answers.slice().sort((a, b) => a - b).map((n, i) => (
                                                <div key={i} className="w-8 h-10 bg-slate-50 border border-slate-200 rounded-lg flex items-center justify-center font-black text-slate-800 text-lg shadow-sm">
                                                    {n}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {(mode === 'practice' || mode === 'review') && (
                                        <button
                                            onClick={() => nextQuestion(undefined, undefined, true)}
                                            className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-xl shadow-lg hover:bg-black transition-colors"
                                        >
                                            次の問題へ
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
